<!DOCTYPE html>
<html>
<head>
<title>Indian Book Catalog</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

<div class="container mt-4">

<h2 class="text-center text-primary mb-4">📚 Indian Book Catalog</h2>

<div class="card shadow p-3 mb-4">

<div class="row g-3">

<div class="col-md-3">
<select id="genreFilter" class="form-select">
<option value="all">All Genres</option>
</select>
</div>

<div class="col-md-3">
<input type="text" id="authorFilter" class="form-control" placeholder="Search Author">
</div>

<div class="col-md-3">
<input type="number" id="minPrice" class="form-control" placeholder="Min Price">
</div>

<div class="col-md-3">
<input type="number" id="maxPrice" class="form-control" placeholder="Max Price">
</div>

</div>
</div>

<div class="card shadow">
<table class="table table-hover text-center mb-0" id="bookTable">

<thead class="table-dark">
<tr>
<th>Title</th>
<th>Author</th>
<th>Genre</th>
<th>Price ₹</th>
<th>Publication</th>
</tr>
</thead>

<tbody></tbody>

</table>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
